<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a1a;color:#fff;font-family:'Roboto Condensed',sans-serif;min-height:100vh}

.header{background:#000;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#fff;cursor:pointer;user-select:none}
.header-right{display:flex;align-items:center;gap:12px}
.search-wrap{display:flex;align-items:center;background:#fff;border-radius:4px;overflow:hidden;height:34px}
.search-wrap input{border:none;outline:none;padding:0 10px;font-size:14px;width:240px;font-family:'Roboto Condensed',sans-serif;background:#fff;color:#000}
.search-icon{padding:0 8px;cursor:pointer;color:#000;font-size:16px;background:#fff;border:none;height:100%}
.search-clear{padding:0 8px;cursor:pointer;color:#666;font-size:18px;background:#fff;border:none;height:100%;line-height:1}
.avatar-btn{width:42px;height:42px;border-radius:50%;background:#333;border:2px solid #fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px}

.nav{background:#000;display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid #333}
.nav-item{padding:14px 0;text-align:center;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:#bbb;transition:color .2s;border-right:1px solid #333;user-select:none}
.nav-item:last-child{border-right:none}
.nav-item.active{color:#fff;border-bottom:3px solid #fff}
.nav-item:hover{color:#fff}

.page{padding:24px;max-width:1200px;margin:0 auto}

.loading{display:flex;align-items:center;justify-content:center;height:300px;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:#555}
.loading::after{content:'';animation:dots 1.2s infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}

.home-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:32px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;margin-bottom:16px;color:#fff}
.genre-block{margin-bottom:24px}
.genre-label{background:#000;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;padding:5px 10px;text-align:center;margin-bottom:10px}
.genre-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.movie-thumb{cursor:pointer;text-align:center}
.movie-thumb img,.movie-thumb .poster-ph{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;transition:transform .2s}
.movie-thumb:hover img,.movie-thumb:hover .poster-ph{transform:scale(1.04)}
.movie-thumb .mtitle{font-size:11px;font-weight:700;text-transform:uppercase;margin-top:4px;line-height:1.3}
.movie-thumb .myear{font-size:10px;color:#aaa;text-transform:uppercase}
.poster-ph{background:linear-gradient(135deg,#2a2a2a,#111);display:flex;align-items:center;justify-content:center;font-size:10px;color:#555;text-align:center;padding:8px;line-height:1.3;font-weight:700;text-transform:uppercase}

.release-month{font-family:'Bebas Neue',sans-serif;background:#000;color:#fff;padding:6px 10px;text-align:center;margin-bottom:10px;font-size:14px;letter-spacing:2px}
.release-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.release-item .rdate{font-size:10px;color:#aaa;margin-top:3px;text-align:center}

.films-layout{display:grid;grid-template-columns:200px 1fr;gap:24px}
.filters h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;margin-bottom:20px}
.filter-group{margin-bottom:16px}
.filter-group label{font-size:12px;font-weight:700;letter-spacing:1px;display:block;margin-bottom:6px}
.filter-select{width:100%;background:#2a2a2a;border:1px solid #444;color:#fff;padding:7px 8px;font-family:'Roboto Condensed',sans-serif;font-size:13px;cursor:pointer;appearance:none}

.movies-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.movie-card{cursor:pointer;background:#111}
.movie-card img,.movie-card .poster-ph{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;transition:transform .2s}
.movie-card:hover img,.movie-card:hover .poster-ph{transform:scale(1.03)}
.movie-card .mc-title{font-size:13px;font-weight:700;text-transform:uppercase;padding:8px 8px 2px;line-height:1.3}
.movie-card .mc-meta{font-size:11px;color:#aaa;padding:0 8px 8px;text-transform:uppercase}

.info-banner{background:linear-gradient(135deg,#111 0%,#2a2a2a 100%);padding:60px 40px;text-align:center;min-height:400px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}

.info-inner{position:relative;z-index:1;max-width:700px}
.info-inner h1{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;line-height:1.1;margin-bottom:8px}

.info-devices{margin-top:40px;display:flex;justify-content:center;gap:30px;flex-wrap:wrap}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#f5f5f5;color:#000;width:540px;max-width:95vw;padding:40px;position:relative;border-radius:2px}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;text-align:center;margin-bottom:30px}
.modal-close{position:absolute;right:16px;top:16px;background:#333;color:#fff;border:none;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.modal-submit{width:100%;background:#000;color:#fff;border:none;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;cursor:pointer;transition:background .2s;margin-bottom:4px}
.modal-submit:hover{background:#333}

.profile-info{background:#111;padding:20px;margin-bottom:20px;border:1px solid #333}

.admin-tab-row{display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid #333}
.admin-tab{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;padding:10px 24px;cursor:pointer;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px}
.admin-tab.active{color:#fff;border-bottom:3px solid #fff}

@media(max-width:768px){

.fav-grid{grid-template-columns:repeat(3,1fr)}
.admin-row{grid-template-columns:1fr}

</style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;

// ── LOCALSTORAGE HELPERS ──────────────────────────────────────────────────────
const lsGet=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

// ── DB LAYER ──────────────────────────────────────────────────────────────────
// Загружаем db.json один раз, потом храним в localStorage как кэш + пользовательские правки
const DB_KEY='km_db_v1';

async function loadDB(){
  // Если есть в localStorage — используем его (включая добавленные администратором фильмы)
  const cached=lsGet(DB_KEY,null);
  if(cached)return cached;
  // Иначе fetch из файла
  try{
    const r=await fetch('db.json');
    if(!r.ok)throw new Error('no db.json');
    const data=await r.json();
    lsSet(DB_KEY,data);
    return data;
  }catch{
    // Fallback — встроенная база если db.json не найден (например, открыт как file://)
    const fallback=getFallbackDB();
    lsSet(DB_KEY,fallback);
    return fallback;
  }
}

function saveDB(db){lsSet(DB_KEY,db);}

function getFallbackDB(){
  return{movies:[
    {id:1,title:"Дюна: Часть Третья",year:2026,genre:"Боевик",country:"США",type:"movie",poster:"",desc:"Продолжение эпической саги о Поле Атрейдесе и его пути к власти на планете Арракис."},

    {id:9,title:"Домовёнок Кузя 2",year:2025,genre:"Фантастика",country:"Россия",type:"movie",poster:"",desc:"Любимый домовёнок Кузя возвращается в новом приключении."},
    {id:10,title:"На цепи",year:2025,genre:"Боевик",country:"Россия",type:"movie",poster:"",desc:"Бывший спецназовец втянут в смертельную игру криминального мира."},

    {id:106,title:"Разрыв",year:2025,genre:"Триллер",country:"Россия",type:"series",seasons:1,poster:"",desc:"Психологический триллер о семье в тихом загородном доме."},
  ]};
}

// ── POSTER COMPONENT ──────────────────────────────────────────────────────────
function Poster({src,alt,className,style,mini}){
  const[err,setErr]=useState(false);
  if(err||!src){
    if(mini)return<div className="poster-mini-ph">{(alt||'').slice(0,6)}</div>;
    return<div className="poster-ph"style={style}>{alt||'Постер'}</div>;
  }
  return<img src={src}alt={alt||''}className={className}style={style}onError={()=>setErr(true)}/>;
}

// ── AUTH MODAL ────────────────────────────────────────────────────────────────
function AuthModal({onClose,onAuth}){
  const[mode,setMode]=useState('start');
  const[email,setEmail]=useState('');
  const[password,setPassword]=useState('');
  const[name,setName]=useState('');
  const[error,setError]=useState('');

  const users=lsGet('km_users',{});

  const nextFromStart=()=>{
    setError('');
    if(!email.includes('@')){setError('Введите корректный email');return;}
    setMode(users[email]?'login':'register');
  };

  const submit=()=>{
    setError('');
    if(mode==='login'){
      if(!users[email]){setError('Пользователь не найден');return;}
      if(users[email].password!==password){setError('Неверный пароль');return;}
      const u={email,name:users[email].name};
      lsSet('km_cur',u);onAuth(u);
    }else{
      if(!name.trim()){setError('Введите имя');return;}
      if(password.length<4){setError('Пароль минимум 4 символа');return;}
      lsSet('km_users',{...users,[email]:{password,name:name.trim()}});
      const u={email,name:name.trim()};
      lsSet('km_cur',u);onAuth(u);
    }
  };

  return(
    <div className="modal-overlay"onClick={e=>{if(e.target.className==='modal-overlay')onClose()}}>
      <div className="modal">
        <button className="modal-close"onClick={onClose}>×</button>
        <h2>ВХОД / РЕГИСТРАЦИЯ</h2>
        {error&&<div className="modal-error">{error}</div>}
        <div className="modal-label">ЭЛЕКТРОННАЯ ПОЧТА:</div>
        <input className="modal-input"type="email"placeholder="email@example.com"
          value={email}onChange={e=>setEmail(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&(mode==='start'?nextFromStart():submit())}
          disabled={mode!=='start'}/>
        {mode!=='start'&&<>
          {mode==='register'&&<><div className="modal-label">ИМЯ:</div>
            <input className="modal-input"type="text"placeholder="Ваше имя"
              value={name}onChange={e=>setName(e.target.value)}/></>}
          <div className="modal-label">ПАРОЛЬ:</div>
          <input className="modal-input"type="password"placeholder="Пароль"
            value={password}onChange={e=>setPassword(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&submit()}/>
        </>}
        {mode==='start'&&<button className="modal-submit"onClick={nextFromStart}>ПРОДОЛЖИТЬ</button>}
        {mode!=='start'&&<button className="modal-submit"onClick={submit}>
          {mode==='login'?'ВОЙТИ':'ЗАРЕГИСТРИРОВАТЬСЯ'}
        </button>}
        {mode==='login'&&<div className="modal-switch">Нет аккаунта? <span onClick={()=>{setMode('register');setError('')}}>Зарегистрироваться</span></div>}
        {mode==='register'&&<div className="modal-switch">Есть аккаунт? <span onClick={()=>{setMode('login');setError('')}}>Войти</span></div>}
        {mode!=='start'&&<div className="modal-switch"><span onClick={()=>{setMode('start');setError('')}}>← Изменить email</span></div>}
      </div>
    </div>
  );
}

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
const GENRES_LIST=["Боевик","Комедия","Драма","Триллер","Фэнтзи","Фантастика","Хоррор","Мелодрама","Анимация","Документальный"];
const COUNTRIES_LIST=["Россия","США","Корея","Германия","Франция","Великобритания","Япония","Китай","Индия","Италия"];
const EMPTY_FORM={title:'',year:String(new Date().getFullYear()),genre:'Боевик',country:'Россия',type:'movie',seasons:'1',poster:'',desc:''};

function AdminPanel({db,onDBChange,onBack}){
  const[subtab,setSubtab]=useState('list');
  const[form,setForm]=useState(EMPTY_FORM);
  const[editId,setEditId]=useState(null);
  const[success,setSuccess]=useState('');
  const[filterType,setFilterType]=useState('all');
  const[search,setSearch]=useState('');

  const movies=db.movies;
  const visible=movies.filter(m=>{
    if(filterType!=='all'&&m.type!==filterType)return false;
    if(search&&!m.title.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));

  const startEdit=(m)=>{
    setForm({title:m.title,year:String(m.year),genre:m.genre,country:m.country,
      type:m.type,seasons:String(m.seasons||1),poster:m.poster||'',desc:m.desc||''});
    setEditId(m.id);setSubtab('add');setSuccess('');
  };

  const cancelEdit=()=>{setForm(EMPTY_FORM);setEditId(null);setSubtab('list');};

  const save=()=>{
    if(!form.title.trim()){alert('Введите название');return;}
    const entry={
      id:editId||(Date.now()),
      title:form.title.trim(),
      year:parseInt(form.year)||2025,
      genre:form.genre,
      country:form.country,
      type:form.type,
      poster:form.poster.trim(),
      desc:form.desc.trim(),
      ...(form.type==='series'?{seasons:parseInt(form.seasons)||1}:{})
    };
    let newMovies;
    if(editId){
      newMovies=movies.map(m=>m.id===editId?entry:m);
      setSuccess('Запись обновлена ✓');
    }else{
      newMovies=[...movies,entry];
      setSuccess('Фильм добавлен ✓');
    }
    const newDB={...db,movies:newMovies};
    saveDB(newDB);onDBChange(newDB);
    setForm(EMPTY_FORM);setEditId(null);
    if(!editId)setSubtab('list');
  };

  const remove=(id)=>{
    if(!confirm('Удалить эту запись?'))return;
    const newDB={...db,movies:movies.filter(m=>m.id!==id)};
    saveDB(newDB);onDBChange(newDB);
  };

  const resetDB=()=>{
    if(!confirm('Сбросить базу к начальным данным? Все изменения будут потеряны.'))return;
    const fb=getFallbackDB();saveDB(fb);onDBChange(fb);setSuccess('База сброшена');
  };

  const exportDB=()=>{
    const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='db.json';a.click();
  };

  return(
    <div className="admin-page">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <h1>ПАНЕЛЬ АДМИНИСТРАТОРА</h1>
        <button className="btn-back"onClick={onBack}>← НАЗАД</button>
      </div>
      <div className="admin-tab-row">
        <div className={`admin-tab${subtab==='list'?' active':''}`}onClick={()=>{setSubtab('list');cancelEdit()}}>СПИСОК ({movies.length})</div>
        <div className={`admin-tab${subtab==='add'?' active':''}`}onClick={()=>{setSubtab('add');if(!editId)setForm(EMPTY_FORM)}}>
          {editId?'РЕДАКТИРОВАТЬ':'ДОБАВИТЬ'}
        </div>
      </div>

      {subtab==='list'&&<>
        <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
          <input className="admin-input"placeholder="Поиск по названию..."
            value={search}onChange={e=>setSearch(e.target.value)}style={{flex:1,minWidth:200}}/>
          <select className="admin-select"value={filterType}onChange={e=>setFilterType(e.target.value)}style={{width:160}}>
            <option value="all">Все ({movies.length})</option>
            <option value="movie">Фильмы ({movies.filter(m=>m.type==='movie').length})</option>
            <option value="series">Сериалы ({movies.filter(m=>m.type==='series').length})</option>
          </select>
          <button className="admin-btn secondary"onClick={exportDB}>ЭКСПОРТ JSON</button>
          <button className="admin-btn danger"onClick={resetDB}>СБРОС БД</button>
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="admin-table">
            <thead><tr>
              <th>Постер</th><th>Название</th><th>Год</th><th>Жанр</th>
              <th>Страна</th><th>Тип</th><th>Действия</th>
            </tr></thead>
            <tbody>
              {visible.map(m=>(
                <tr key={m.id}>
                  <td><Poster src={m.poster}alt={m.title}mini/></td>
                  <td style={{maxWidth:200}}>{m.title}</td>
                  <td>{m.year}</td>
                  <td>{m.genre}</td>
                  <td>{m.country}</td>
                  <td>{m.type==='movie'?'Фильм':'Сериал'}{m.seasons?` (${m.seasons}с)`:''}</td>
                  <td style={{whiteSpace:'nowrap'}}>
                    <button className="admin-btn"style={{padding:'5px 12px',fontSize:13}}onClick={()=>startEdit(m)}>✏️</button>
                    {' '}
                    <button className="admin-btn danger"style={{padding:'5px 12px',fontSize:13}}onClick={()=>remove(m.id)}>🗑️</button>
                  </td>
                </tr>
              ))}
              {visible.length===0&&<tr><td colSpan={7}style={{textAlign:'center',color:'#555',padding:30}}>Ничего не найдено</td></tr>}
            </tbody>
          </table>
        </div>
      </>}

      {subtab==='add'&&<div className="admin-form">
        <h2>{editId?'РЕДАКТИРОВАТЬ ЗАПИСЬ':'ДОБАВИТЬ ФИЛЬМ / СЕРИАЛ'}</h2>
        <div className="admin-row">
          <div>
            <div className="modal-label"style={{color:'#aaa',marginBottom:4}}>НАЗВАНИЕ *</div>
            <input className="admin-input"placeholder="Название"value={form.title}onChange={e=>setF('title',e.target.value)}/>
          </div>
          <div>
            <div className="modal-label"style={{color:'#aaa',marginBottom:4}}>ГОД ВЫПУСКА</div>
            <input className="admin-input"type="number"placeholder="2025"value={form.year}onChange={e=>setF('year',e.target.value)}/>
          </div>
        </div>
        <div className="admin-row">
          <div>
            <div className="modal-label"style={{color:'#aaa',marginBottom:4}}>ЖАНР</div>
            <select className="admin-select"value={form.genre}onChange={e=>setF('genre',e.target.value)}>
              {GENRES_LIST.map(g=><option key={g}value={g}>{g}</option>)}
            </select>
          </div>
          <div>
            <div className="modal-label"style={{color:'#aaa',marginBottom:4}}>СТРАНА</div>
            <select className="admin-select"value={form.country}onChange={e=>setF('country',e.target.value)}>
              {COUNTRIES_LIST.map(c=><option key={c}value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div className="admin-row">
          <div>
            <div className="modal-label"style={{color:'#aaa',marginBottom:4}}>ТИП</div>
            <select className="admin-select"value={form.type}onChange={e=>setF('type',e.target.value)}>
              <option value="movie">Фильм</option>
              <option value="series">Сериал</option>
            </select>
          </div>
          {form.type==='series'&&<div>
            <div className="modal-label"style={{color:'#aaa',marginBottom:4}}>СЕЗОНОВ</div>
            <input className="admin-input"type="number"min="1"value={form.seasons}onChange={e=>setF('seasons',e.target.value)}/>
          </div>}
        </div>
        <div className="modal-label"style={{color:'#aaa',marginBottom:4}}>URL ПОСТЕРА (ссылка на изображение или путь posters/name.jpg)</div>
        <input className="admin-input"placeholder="https://... или posters/filename.jpg"
          value={form.poster}onChange={e=>setF('poster',e.target.value)}style={{width:'100%',marginBottom:12}}/>
        {form.poster&&<div style={{marginBottom:12}}>
          <Poster src={form.poster}alt={form.title}style={{height:120,width:'auto',display:'block'}}/>
        </div>}
        <div className="modal-label"style={{color:'#aaa',marginBottom:4}}>ОПИСАНИЕ</div>
        <textarea className="admin-textarea"placeholder="Краткое описание..."
          value={form.desc}onChange={e=>setF('desc',e.target.value)}/>
        <div>
          <button className="admin-btn"onClick={save}>{editId?'СОХРАНИТЬ ИЗМЕНЕНИЯ':'ДОБАВИТЬ'}</button>
          <button className="admin-btn secondary"onClick={cancelEdit}>ОТМЕНА</button>
        </div>
        {success&&<div className="admin-success">{success}</div>}
      </div>}
    </div>
  );
}

// ── FILTERS PANEL ─────────────────────────────────────────────────────────────
function Filters({filters,onChange,movies}){
  const genres=useMemo(()=>['',...new Set(movies.map(m=>m.genre))].sort(),[movies]);
  const countries=useMemo(()=>['',...new Set(movies.map(m=>m.country))].sort(),[movies]);
  const years=useMemo(()=>['',...new Set(movies.map(m=>String(m.year)))].sort((a,b)=>b-a),[movies]);
  return(
    <div className="filters">
      <h2>ФИЛЬТРЫ</h2>
      {[
        {k:'year',label:'ГОД ВЫПУСКА',opts:years},
        {k:'genre',label:'ЖАНР',opts:genres},
        {k:'country',label:'СТРАНА',opts:countries},
      ].map(({k,label,opts})=>(
        <div className="filter-group"key={k}>
          <label>{label}:</label>
          <select className="filter-select"value={filters[k]}onChange={e=>onChange({...filters,[k]:e.target.value})}>
            {opts.map(o=><option key={o}value={o}>{o||'—'}</option>)}
          </select>
        </div>
      ))}
      {(filters.year||filters.genre||filters.country)&&
        <button className="admin-btn secondary"style={{width:'100%',fontSize:13,padding:'7px 0'}}
          onClick={()=>onChange({year:'',genre:'',country:''})}>СБРОСИТЬ</button>}
    </div>
  );
}

// ── HOME PAGE ─────────────────────────────────────────────────────────────────
function HomePage({movies,onMovie}){
  const ms=movies.filter(m=>m.type==='movie');
  const action=ms.filter(m=>m.genre==='Боевик').slice(0,2);
  const comedy=ms.filter(m=>m.genre==='Комедия').slice(0,2);
  const popular=ms.slice(0,4);
  const march=ms.slice(8,10);
  const april=ms.slice(10,12);

  const Thumb=({movie,date})=>(
    <div className="movie-thumb"onClick={()=>onMovie(movie)}>
      <Poster src={movie.poster}alt={movie.title}/>
      <div className="mtitle">{movie.title}</div>
      <div className="myear">{date||`${movie.year}, ${movie.genre}`}</div>
    </div>
  );

  return(
    <div className="page">
      <div className="home-grid">
        <div>
          <div className="section-title">ОЖИДАЕМЫЕ НОВИНКИ</div>
          <div className="genre-block">
            <div className="genre-label">БОЕВИК</div>
            <div className="genre-row">{action.map(m=><Thumb key={m.id}movie={m}/>)}</div>
          </div>
          <div className="genre-block">
            <div className="genre-label">КОМЕДИЯ</div>
            <div className="genre-row">{comedy.map(m=><Thumb key={m.id}movie={m}/>)}</div>
          </div>
        </div>
        <div>
          <div className="section-title"style={{textAlign:'center'}}>ПОПУЛЯРНОЕ</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {popular.map(m=><Thumb key={m.id}movie={m}/>)}
          </div>
        </div>
        <div>
          <div className="section-title"style={{textAlign:'right'}}>БЛИЖАЙШИЕ РЕЛИЗЫ</div>
          <div className="release-month">ИЮНЬ</div>
          <div className="release-row">
            {march.map((m,i)=>(
              <div className="movie-thumb release-item"key={m.id}onClick={()=>onMovie(m)}>
                <Poster src={m.poster}alt={m.title}/>
                <div className="mtitle">{m.title}</div>
                <div className="rdate">{i===0?'14 марта':'19 марта'}</div>
              </div>
            ))}
          </div>
          <div className="release-month">ИЮЛЬ</div>
          <div className="release-row">
            {april.map((m,i)=>(
              <div className="movie-thumb release-item"key={m.id}onClick={()=>onMovie(m)}>
                <Poster src={m.poster}alt={m.title}/>
                <div className="mtitle">{m.title}</div>
                <div className="rdate">{i===0?'1 апреля':'2 апреля'}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── LIST PAGE ─────────────────────────────────────────────────────────────────
function ListPage({type,movies,onMovie}){
  const[filters,setFilters]=useState({genre:'',year:'',country:''});
  const items=movies.filter(m=>m.type===type);
  const filtered=items.filter(m=>{
    if(filters.genre&&m.genre!==filters.genre)return false;
    if(filters.year&&String(m.year)!==filters.year)return false;
    if(filters.country&&m.country!==filters.country)return false;
    return true;
  });
  return(
    <div className="page">
      <div className="films-layout">
        <Filters filters={filters}onChange={setFilters}movies={items}/>
        <div>
          <div className="movies-grid">
            {filtered.length===0&&<div className="no-results"style={{gridColumn:'1/-1'}}>Ничего не найдено</div>}
            {filtered.map(m=>(
              <div className="movie-card"key={m.id}onClick={()=>onMovie(m)}>
                <Poster src={m.poster}alt={m.title}/>
                <div className="mc-title">{m.title}</div>
                <div className="mc-meta">{m.year}, {m.genre}{m.seasons?`, ${m.seasons} сез.`:''}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── MOVIE DETAIL ──────────────────────────────────────────────────────────────
function MovieDetail({movie,user,onBack,favs,toggleFav,onAuthNeeded}){

          </div>

function ProfilePage({user,movies,onLogout,favs,onMovie,onAdmin}){

      {favMovies.length===0&&<div style={{color:'#666',marginBottom:20}}>Ничего не добавлено</div>}

        {favMovies.map(m=>(
          <div className="movie-thumb"key={m.id}onClick={()=>onMovie(m)}>

}

// ── SEARCH RESULTS ────────────────────────────────────────────────────────────
function SearchResults({query,movies,onMovie}){
  const q=query.toLowerCase().trim();
  const results=q?movies.filter(m=>
    m.title.toLowerCase().includes(q)||
    m.genre.toLowerCase().includes(q)||
    m.country.toLowerCase().includes(q)||
    String(m.year).includes(q)
  ):[];
  return(
    <div className="search-results">
      <h2>ПОИСК: «{query}» — {results.length} результатов</h2>
      {results.length===0&&<div className="no-results">Ничего не найдено</div>}
      <div className="movies-grid">
        {results.map(m=>(
          <div className="movie-card"key={m.id}onClick={()=>onMovie(m)}>
            <Poster src={m.poster}alt={m.title}/>
            <div className="mc-title">{m.title}</div>
            <div className="mc-meta">{m.year}, {m.genre}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App(){
  const[db,setDB]=useState(null);
  const[tab,setTab]=useState('home');
  const[prevTab,setPrevTab]=useState('home');
  const[showAuth,setShowAuth]=useState(false);
  const[user,setUser]=useState(()=>lsGet('km_cur',null));
  const[favs,setFavs]=useState([]);
  const[selectedMovie,setSelectedMovie]=useState(null);
  const[searchInput,setSearchInput]=useState('');
  const[searchQ,setSearchQ]=useState('');

  // Load DB on mount
  useEffect(()=>{
    loadDB().then(data=>setDB(data));
  },[]);

  // Sync favs
  useEffect(()=>{
    if(user)setFavs(lsGet('km_favs_'+user.email,[]));
    else setFavs([]);
  },[user?.email]);

  const movies=db?.movies||[];

  const toggleFav=useCallback((id)=>{
    if(!user)return;
    const next=favs.includes(id)?favs.filter(x=>x!==id):[...favs,id];
    setFavs(next);lsSet('km_favs_'+user.email,next);
  },[user,favs]);

  const goMovie=(m)=>{setPrevTab(tab);setSelectedMovie(m);setTab('detail')};
  const goBack=()=>{setSelectedMovie(null);setTab(prevTab)};

  const handleAuth=(u)=>{setUser(u);setShowAuth(false)};
  const handleLogout=()=>{lsSet('km_cur',null);setUser(null);setTab('home')};

  const doSearch=()=>{
    const q=searchInput.trim();
    if(!q)return;
    setSearchQ(q);setPrevTab(tab);setTab('search');
  };

  const navClick=(t)=>{
    if(t==='profile'){if(!user){setShowAuth(true);return;}setTab('profile');return;}
    setSelectedMovie(null);setTab(t);
  };

  if(!db)return(
    <div>
      <div className="header"><div className="logo">КИНОМАНИЯ</div></div>
      <div className="nav">{['ГЛАВНАЯ','ФИЛЬМЫ','СЕРИАЛЫ','ИНФО'].map(l=><div key={l}className="nav-item">{l}</div>)}</div>
      <div className="loading">ЗАГРУЗКА</div>
    </div>
  );

  return(
    <div>
      <div className="header">
        <div className="logo"onClick={()=>navClick('home')}>КИНОМАНИЯ</div>
        <div className="header-right">
          <div className="search-wrap">
            <button className="search-icon"onClick={doSearch}></button>
            <input placeholder="Поиск..."value={searchInput}
              onChange={e=>setSearchInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&doSearch()}/>
            {searchInput&&<button className="search-clear"
              onClick={()=>{setSearchInput('');if(tab==='search')setTab(prevTab)}}>×</button>}
          </div>
          <div className="avatar-btn"onClick={()=>user?navClick('profile'):setShowAuth(true)}>
            {user
              ?<span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15}}>{user.name[0].toUpperCase()}</span>
              :'👤'}
          </div>
        </div>
      </div>

      <div className="nav">
        {[['home','ГЛАВНАЯ'],['movies','ФИЛЬМЫ'],['series','СЕРИАЛЫ'],['info','ИНФО']].map(([t,l])=>(
          <div key={t}className={`nav-item${(tab===t||(!['home','movies','series','info'].includes(tab)&&t==='home'&&tab==='home'))?' active':''}`}
            style={{borderBottom:tab===t?'3px solid #fff':'3px solid transparent'}}
            onClick={()=>navClick(t)}>{l}</div>
        ))}
      </div>

      {tab==='home'&&<HomePage movies={movies}onMovie={goMovie}/>}
      {tab==='movies'&&<ListPage type="movie"movies={movies}onMovie={goMovie}/>}
      {tab==='series'&&<ListPage type="series"movies={movies}onMovie={goMovie}/>}
      {tab==='info'&&<InfoPage/>}
      {tab==='profile'&&user&&<ProfilePage user={user}movies={movies}onLogout={handleLogout}
        favs={favs}onMovie={goMovie}onAdmin={()=>setTab('admin')}/>}
      {tab==='admin'&&<AdminPanel db={db}onDBChange={setDB}onBack={()=>setTab('profile')}/>}
      {tab==='search'&&<SearchResults query={searchQ}movies={movies}onMovie={goMovie}/>}
      {tab==='detail'&&selectedMovie&&<MovieDetail movie={selectedMovie}user={user}
        onBack={goBack}favs={favs}toggleFav={toggleFav}onAuthNeeded={()=>setShowAuth(true)}/>}

      <div className="footer">
        <div className="footer-social">
          НАШИ СОЦСЕТИ:
          {[['🎵','#000'],['💬','#5865F2'],['✈️','#0088cc'],['▶','#FF0000']].map(([i,c],idx)=>(
            <div key={idx}className="social-icon"style={{background:c,border:'1px solid #333'}}>{i}</div>
          ))}
        </div>
        <div className="footer-contact">КОНТАКТЫ</div>
        <div className="footer-copy">© 2026 КИНОМАНИЯ</div>
      </div>

      {showAuth&&<AuthModal onClose={()=>setShowAuth(false)}onAuth={handleAuth}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
