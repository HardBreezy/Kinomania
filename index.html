<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a1a;color:#fff;font-family:'Roboto Condensed',sans-serif;min-height:100vh}
:root{--black:#000;--dark:#111;--mid:#222;--accent:#fff;--gray:#888;--red:#e50914}

/* HEADER */
.header{background:#000;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#fff;cursor:pointer;user-select:none}
.header-right{display:flex;align-items:center;gap:12px}
.search-wrap{display:flex;align-items:center;background:#fff;border-radius:4px;overflow:hidden;height:34px}
.search-wrap input{border:none;outline:none;padding:0 10px;font-size:14px;width:240px;font-family:'Roboto Condensed',sans-serif;background:#fff;color:#000}
.search-icon{padding:0 8px;cursor:pointer;color:#000;font-size:16px;background:#fff;border:none;height:100%}
.search-clear{padding:0 8px;cursor:pointer;color:#666;font-size:18px;background:#fff;border:none;height:100%;line-height:1}
.avatar-btn{width:42px;height:42px;border-radius:50%;background:#333;border:2px solid #fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
.avatar-btn img{width:100%;height:100%;object-fit:cover}

/* NAV */
.nav{background:#000;display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid #333}
.nav-item{padding:14px 0;text-align:center;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:#bbb;transition:color .2s;border-right:1px solid #333;user-select:none}
.nav-item:last-child{border-right:none}
.nav-item.active{color:#fff;border-bottom:3px solid #fff}
.nav-item:hover{color:#fff}

/* MAIN */
.page{padding:24px;max-width:1200px;margin:0 auto}

/* HOME */
.home-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:32px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;margin-bottom:16px;color:#fff}
.genre-block{margin-bottom:24px}
.genre-label{background:#000;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;padding:5px 10px;text-align:center;margin-bottom:10px}
.genre-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.movie-thumb{cursor:pointer;text-align:center}
.movie-thumb img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;transition:transform .2s}
.movie-thumb:hover img{transform:scale(1.04)}
.movie-thumb .mtitle{font-size:11px;font-weight:700;text-transform:uppercase;margin-top:4px;line-height:1.3}
.movie-thumb .myear{font-size:10px;color:#aaa;text-transform:uppercase}

/* POPULAR column */
.popular-col .movie-thumb{margin-bottom:16px}
.popular-col .movie-thumb img{aspect-ratio:2/3}

/* RELEASES column */
.release-month{font-family:'Bebas Neue',sans-serif;background:#000;color:#fff;padding:6px 10px;text-align:center;margin-bottom:10px;font-size:14px;letter-spacing:2px}
.release-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.release-item .rdate{font-size:10px;color:#aaa;margin-top:3px;text-align:center}

/* FILMS PAGE */
.films-layout{display:grid;grid-template-columns:200px 1fr;gap:24px}
.filters{background:#1a1a1a}
.filters h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;margin-bottom:20px}
.filter-group{margin-bottom:16px}
.filter-group label{font-size:12px;font-weight:700;letter-spacing:1px;display:block;margin-bottom:6px}
.filter-select-wrap{display:flex;align-items:center;gap:4px}
.filter-select{background:#2a2a2a;border:1px solid #444;color:#fff;padding:6px 8px;font-family:'Roboto Condensed',sans-serif;font-size:13px;flex:1;cursor:pointer;appearance:none}
.filter-select option{background:#2a2a2a}
.filter-btn{background:#333;border:none;color:#fff;padding:6px 8px;cursor:pointer;font-size:13px}
.filter-dropdown{background:#2a2a2a;border:1px solid #444;margin-top:2px;max-height:160px;overflow-y:auto}
.filter-dropdown .fd-item{padding:6px 10px;cursor:pointer;font-size:13px}
.filter-dropdown .fd-item:hover,.filter-dropdown .fd-item.sel{background:#444}

.movies-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.movie-card{cursor:pointer;background:#111}
.movie-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;transition:transform .2s}
.movie-card:hover img{transform:scale(1.03)}
.movie-card .mc-title{font-size:13px;font-weight:700;text-transform:uppercase;padding:8px 8px 2px;line-height:1.3}
.movie-card .mc-meta{font-size:11px;color:#aaa;padding:0 8px 8px;text-transform:uppercase}

/* INFO PAGE */
.info-banner{background:linear-gradient(135deg,#111 0%,#2a2a2a 100%);padding:60px 40px;text-align:center;min-height:400px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.info-banner::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.info-inner{position:relative;z-index:1;max-width:700px}
.info-inner h1{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;line-height:1.1;margin-bottom:8px}
.info-inner h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#ccc;margin-bottom:30px}
.info-inner p{font-size:18px;font-weight:700;line-height:1.6;margin-bottom:12px}
.info-devices{margin-top:40px;display:flex;justify-content:center;gap:30px;flex-wrap:wrap}
.info-device{background:#000;border:2px solid #333;padding:20px 30px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;min-width:150px}
.info-device .dev-icon{font-size:40px;margin-bottom:8px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#f5f5f5;color:#000;width:540px;max-width:95vw;padding:40px;position:relative;border-radius:2px}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;text-align:center;margin-bottom:30px}
.modal-close{position:absolute;right:16px;top:16px;background:#333;color:#fff;border:none;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-label{font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:6px}
.modal-input{width:100%;border:2px solid #ccc;padding:12px 14px;font-size:14px;font-family:'Roboto Condensed',sans-serif;margin-bottom:16px;outline:none;background:#fff}
.modal-input:focus{border-color:#000}
.modal-submit{width:100%;background:#000;color:#fff;border:none;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;cursor:pointer;transition:background .2s}
.modal-submit:hover{background:#333}
.modal-error{color:red;font-size:12px;margin-bottom:10px;text-align:center}
.modal-switch{text-align:center;margin-top:14px;font-size:13px}
.modal-switch span{cursor:pointer;text-decoration:underline;font-weight:700}
.modal-welcome{text-align:center;padding:10px 0;font-size:14px;color:#333}

.md-meta{color:#aaa;font-size:14px;margin-bottom:16px;text-transform:uppercase}
.md-badge{display:inline-block;background:#222;border:1px solid #444;padding:3px 10px;font-size:12px;margin-right:6px;margin-bottom:8px;text-transform:uppercase}
.md-desc{font-size:15px;line-height:1.7;color:#ccc;margin-top:12px}
.md-actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
.btn-fav{background:#fff;color:#000;border:none;padding:10px 22px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:background .2s}
.btn-fav:hover{background:#ddd}
.btn-fav.active{background:#e50914;color:#fff}
.btn-back{background:transparent;color:#fff;border:2px solid #fff;padding:10px 22px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.btn-back:hover{background:#fff;color:#000}

.profile-page{max-width:700px;margin:0 auto;padding:30px 24px}
.profile-page h1{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;margin-bottom:20px}
.profile-info{background:#111;padding:20px;margin-bottom:20px;border:1px solid #333}
.profile-info p{margin-bottom:8px;font-size:14px}
.profile-info strong{color:#fff}
.fav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
.logout-btn{background:transparent;color:#fff;border:2px solid #fff;padding:10px 24px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-top:10px}
.logout-btn:hover{background:#fff;color:#000}

.footer{background:#000;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;margin-top:40px;border-top:1px solid #222}
.footer-social{display:flex;align-items:center;gap:4px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px}
.social-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin-left:6px;cursor:pointer}
.footer-copy{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:#888}
.footer-contact{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:#aaa;cursor:pointer}
.footer-contact:hover{color:#fff}

.search-results{padding:24px;max-width:1200px;margin:0 auto}
.search-results h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;margin-bottom:20px}
.no-results{text-align:center;color:#666;font-size:18px;padding:60px 0;font-family:'Bebas Neue',sans-serif;letter-spacing:2px}

/* Placeholder poster */
.poster-placeholder{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,#2a2a2a,#111);display:flex;align-items:center;justify-content:center;font-size:11px;color:#555;text-align:center;padding:8px;line-height:1.3;font-weight:700;text-transform:uppercase}

@media(max-width:768px){
.home-grid{grid-template-columns:1fr}
.films-layout{grid-template-columns:1fr}
.movies-grid{grid-template-columns:repeat(2,1fr)}
.md-top{flex-direction:column}
.md-poster{width:100%;max-width:260px}
.fav-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

function Poster({src,alt,className,style}){
  const[err,setErr]=useState(false);
  if(err||!src)return<div className="poster-placeholder"style={style}>{alt||"Постер"}</div>;
  return<img src={src}alt={alt||""}className={className}style={style}onError={()=>setErr(true)}/>;
}

// ── AUTH MODAL ────────────────────────────────────────────────────────────────
function AuthModal({onClose,onAuth}){
  const[mode,setMode]=useState('login');// login | register | forgot | step2
  const[email,setEmail]=useState('');
  const[password,setPassword]=useState('');
  const[name,setName]=useState('');
  const[error,setError]=useState('');

  const users=lsGet('km_users',{});

  const submit=()=>{
    setError('');
    if(!email.includes('@')){setError('Введите корректный email');return;}
    if(mode==='login'){
      if(!users[email]){setError('Пользователь не найден');return;}
      if(users[email].password!==password){setError('Неверный пароль');return;}
      lsSet('km_cur',{email,name:users[email].name});
      onAuth({email,name:users[email].name});
    }else if(mode==='register'){
      if(!name.trim()){setError('Введите имя');return;}
      if(password.length<4){setError('Пароль минимум 4 символа');return;}
      const newUsers={...users,[email]:{password,name:name.trim()}};
      lsSet('km_users',newUsers);
      lsSet('km_cur',{email,name:name.trim()});
      onAuth({email,name:name.trim()});
    }
  };

  const isStep1=mode==='step1';
  const step1Next=()=>{
    if(!email.includes('@')){setError('Введите корректный email');return;}
    if(users[email])setMode('login');else setMode('register');
  };

  return(
    <div className="modal-overlay"onClick={e=>{if(e.target.className==='modal-overlay')onClose()}}>
      <div className="modal">
        <button className="modal-close"onClick={onClose}>×</button>
        <h2>ВХОД ИЛИ РЕГИСТРАЦИЯ</h2>
        {error&&<div className="modal-error">{error}</div>}
        <div className="modal-label">ВВЕДИТЕ ЭЛЕКТРОННУЮ ПОЧТУ:</div>
        <input className="modal-input"type="email"placeholder="Электронная почта"
          value={email}onChange={e=>setEmail(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&(mode==='step1'?step1Next():submit())}/>
        {mode==='register'&&<>
          <div className="modal-label">ИМЯ:</div>
          <input className="modal-input"type="text"placeholder="Ваше имя"
            value={name}onChange={e=>setName(e.target.value)}/>
        </>}
        {(mode==='login'||mode==='register')&&<>
          <div className="modal-label">ПАРОЛЬ:</div>
          <input className="modal-input"type="password"placeholder="Пароль"
            value={password}onChange={e=>setPassword(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&submit()}/>
        </>}
        {mode==='step1'&&<button className="modal-submit"onClick={step1Next}>ПРОДОЛЖИТЬ</button>}
        {(mode==='login'||mode==='register')&&<button className="modal-submit"onClick={submit}>
          {mode==='login'?'ВОЙТИ':'ЗАРЕГИСТРИРОВАТЬСЯ'}
        </button>}
        {mode==='step1'&&<div className="modal-switch">
          Нет аккаунта? <span onClick={()=>setMode('register')}>Зарегистрироваться</span>
        </div>}
        {mode==='login'&&<div className="modal-switch">
          Нет аккаунта? <span onClick={()=>{setMode('register');setError('')}}>Зарегистрироваться</span>
        </div>}
        {mode==='register'&&<div className="modal-switch">
          Есть аккаунт? <span onClick={()=>{setMode('login');setError('')}}>Войти</span>
        </div>}
        {mode==='step1'&&<button className="modal-submit"style={{marginTop:8,background:'#333'}}
          onClick={()=>{if(!email.includes('@')){setError('Email?');return;}setMode('login')}}>ВОЙТИ С ПАРОЛЕМ</button>}
      </div>
    </div>
  );
}

// ── MOVIE CARD ────────────────────────────────────────────────────────────────
function MovieCard({movie,onClick}){
  return(
    <div className="movie-card"onClick={()=>onClick(movie)}>
      <Poster src={movie.poster}alt={movie.title}/>
      <div className="mc-title">{movie.title}</div>
      <div className="mc-meta">{movie.year}, {movie.genre}</div>
    </div>
  );
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function Filters({filters,onChange}){
  const[openDrop,setOpenDrop]=useState(null);

  const toggle=(f)=>setOpenDrop(openDrop===f?null:f);
  const select=(f,v)=>{onChange({...filters,[f]:v});setOpenDrop(null)};

  const opts={genre:['',...GENRES],year:['',String(YEARS[0]),String(YEARS[1]),...YEARS.slice(2).map(String)],country:['',...COUNTRIES]};
  const labels={genre:'ЖАНР',year:'ГОД ВЫПУСКА',country:'СТРАНА ВЫПУСКА'};

  return(
    <div className="filters">
      <h2>ФИЛЬТРЫ</h2>
      {['year','genre','country'].map(f=>(
        <div className="filter-group"key={f}>
          <label>{labels[f]}:</label>
          <div className="filter-select-wrap">
            <select className="filter-select"value={filters[f]}onChange={e=>onChange({...filters,[f]:e.target.value})}>
              {opts[f].map(o=><option key={o}value={o}>{o||'—'}</option>)}
            </select>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── HOME PAGE ─────────────────────────────────────────────────────────────────
function HomePage({onMovie}){
  const movies=MOVIES.filter(m=>m.type==='movie');
  const action=movies.filter(m=>m.genre==='Боевик').slice(0,2);
  const comedy=movies.filter(m=>m.genre==='Комедия').slice(0,2);
  const popular=movies.slice(0,4);
  const march=movies.slice(8,10);
  const april=movies.slice(10,12);

  const Thumb=({movie,showDate})=>(
    <div className="movie-thumb"onClick={()=>onMovie(movie)}>
      <Poster src={movie.poster}alt={movie.title}/>
      <div className="mtitle">{movie.title}</div>
      {showDate?<div className="myear">{showDate}</div>:<div className="myear">{movie.year}, {movie.genre}</div>}
    </div>
  );

  return(
    <div className="page">
      <div className="home-grid">
        {/* LEFT: upcoming */}
        <div>
          <div className="section-title">ОЖИДАЕМЫЕ НОВИНКИ</div>
          <div className="genre-block">
            <div className="genre-label">БОЕВИК</div>
            <div className="genre-row">{action.map(m=><Thumb key={m.id}movie={m}/>)}</div>
          </div>
          <div className="genre-block">
            <div className="genre-label">КОМЕДИЯ</div>
            <div className="genre-row">{comedy.map(m=><Thumb key={m.id}movie={m}/>)}</div>
          </div>
        </div>
        {/* CENTER: popular */}
        <div>
          <div className="section-title"style={{textAlign:'center'}}>ПОПУЛЯРНОЕ</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {popular.map(m=><Thumb key={m.id}movie={m}/>)}
          </div>
        </div>
        {/* RIGHT: releases */}
        <div>
          <div className="section-title"style={{textAlign:'right'}}>БЛИЖАЙШИЕ РЕЛИЗЫ</div>
          <div className="release-month">МАРТ</div>
          <div className="release-row">
            {march.map((m,i)=>(
              <div className="movie-thumb release-item"key={m.id}onClick={()=>onMovie(m)}>
                <Poster src={m.poster}alt={m.title}/>
                <div className="mtitle">{m.title}</div>
                <div className="rdate">{i===0?'14 марта':'19 марта'}</div>
              </div>
            ))}
          </div>
          <div className="release-month">АПРЕЛЬ</div>
          <div className="release-row">
            {april.map((m,i)=>(
              <div className="movie-thumb release-item"key={m.id}onClick={()=>onMovie(m)}>
                <Poster src={m.poster}alt={m.title}/>
                <div className="mtitle">{m.title}</div>
                <div className="rdate">{i===0?'1 апреля':'2 апреля'}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── FILMS / SERIES LIST ───────────────────────────────────────────────────────
function ListPage({type,onMovie}){
  const[filters,setFilters]=useState({genre:'',year:'',country:''});
  const items=MOVIES.filter(m=>m.type===type);

  const filtered=items.filter(m=>{
    if(filters.genre&&m.genre!==filters.genre)return false;
    if(filters.year&&String(m.year)!==filters.year)return false;
    if(filters.country&&m.country!==filters.country)return false;
    return true;
  });

  return(
    <div className="page">
      <div className="films-layout">
        <Filters filters={filters}onChange={setFilters}/>
        <div className="movies-grid">
          {filtered.length===0&&<div className="no-results"style={{gridColumn:'1/-1'}}>Ничего не найдено</div>}
          {filtered.map(m=><MovieCard key={m.id}movie={m}onClick={onMovie}/>)}
        </div>
      </div>
    </div>
  );
}

// ── INFO PAGE ─────────────────────────────────────────────────────────────────
function InfoPage(){
  return(
    <div>
      <div className="info-banner">
        <div className="info-inner">
          <h1>КИНОМАНИЯ</h1>
          <h2>ДЛЯ ВСЕХ НА ВСЕХ УСТРОЙСТВАХ</h2>
          <p>Эксклюзивные премьеры, тысячи фильмов, сериалов, мультфильмов.</p>
          <p>Смотрите и проживайте новые истории каждый день!</p>
          <div className="info-devices">
            <div className="info-device"><div className="dev-icon">📱</div>СМАРТФОН</div>
            <div className="info-device"><div className="dev-icon">💻</div>НОУТБУК</div>
            <div className="info-device"><div className="dev-icon">🖥️</div>ТЕЛЕВИЗОР</div>
            <div className="info-device"><div className="dev-icon">📟</div>ПЛАНШЕТ</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── MOVIE DETAIL ──────────────────────────────────────────────────────────────
function MovieDetail({movie,user,onBack,favs,toggleFav,onAuthNeeded}){
  const isFav=favs.includes(movie.id);
  const handleFav=()=>{
    if(!user){onAuthNeeded();return;}
    toggleFav(movie.id);
  };
  return(
    <div className="movie-detail">
      <div className="md-top">
        <div className="md-poster"><Poster src={movie.poster}alt={movie.title}style={{width:'100%'}}/></div>
        <div className="md-info">
          <div className="md-title">{movie.title}</div>
          <div className="md-meta">{movie.year} • {movie.genre} • {movie.country}{movie.seasons?` • ${movie.seasons} сезон(а)`:''}</div>
          <div>
            <span className="md-badge">{movie.genre}</span>
            <span className="md-badge">{movie.country}</span>
            <span className="md-badge">{movie.year}</span>
            {movie.type==='series'&&<span className="md-badge">Сериал</span>}
          </div>
          <div className="md-desc">{movie.desc}</div>
          <div className="md-actions">
            <button className={`btn-fav${isFav?' active':''}`}onClick={handleFav}>
              {isFav?'❤ В ИЗБРАННОМ':'♡ В ИЗБРАННОЕ'}
            </button>
            <button className="btn-back"onClick={onBack}>← НАЗАД</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── PROFILE PAGE ──────────────────────────────────────────────────────────────
function ProfilePage({user,onLogout,favs,onMovie}){
  const favMovies=MOVIES.filter(m=>favs.includes(m.id));
  return(
    <div className="profile-page">
      <h1>ПРОФИЛЬ</h1>
      <div className="profile-info">
        <p><strong>Имя:</strong> {user.name}</p>
        <p><strong>Email:</strong> {user.email}</p>
      </div>
      <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:3,marginBottom:16}}>
        ИЗБРАННОЕ ({favMovies.length})
      </h2>
      {favMovies.length===0&&<div style={{color:'#666',marginBottom:20}}>Пока ничего не добавлено</div>}
      <div className="fav-grid">
        {favMovies.map(m=>(
          <div key={m.id}className="movie-thumb"onClick={()=>onMovie(m)}>
            <Poster src={m.poster}alt={m.title}/>
            <div className="mtitle">{m.title}</div>
          </div>
        ))}
      </div>
      <button className="logout-btn"onClick={onLogout}>ВЫЙТИ</button>
    </div>
  );
}

// ── SEARCH RESULTS ─────────────────────────────────────────────────────────────
function SearchResults({query,onMovie}){
  const q=query.toLowerCase().trim();
  const results=q?MOVIES.filter(m=>
    m.title.toLowerCase().includes(q)||
    m.genre.toLowerCase().includes(q)||
    m.country.toLowerCase().includes(q)||
    String(m.year).includes(q)
  ):[];
  return(
    <div className="search-results">
      <h2>ПОИСК: «{query}»</h2>
      {results.length===0&&<div className="no-results">Ничего не найдено</div>}
      <div className="movies-grid">
        {results.map(m=><MovieCard key={m.id}movie={m}onClick={onMovie}/>)}
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState('home'); // home|movies|series|info|profile|search|detail
  const[showAuth,setShowAuth]=useState(false);
  const[user,setUser]=useState(()=>lsGet('km_cur',null));
  const[favs,setFavs]=useState(()=>lsGet('km_favs_'+(lsGet('km_cur',null)?.email||''),[]) );
  const[selectedMovie,setSelectedMovie]=useState(null);
  const[prevTab,setPrevTab]=useState('home');
  const[searchQ,setSearchQ]=useState('');
  const[searchInput,setSearchInput]=useState('');

  // sync favs when user changes
  useEffect(()=>{
    if(user)setFavs(lsGet('km_favs_'+user.email,[]));
    else setFavs([]);
  },[user?.email]);

  const toggleFav=(id)=>{
    if(!user)return;
    const next=favs.includes(id)?favs.filter(x=>x!==id):[...favs,id];
    setFavs(next);
    lsSet('km_favs_'+user.email,next);
  };

  const goMovie=(m)=>{setPrevTab(tab);setSelectedMovie(m);setTab('detail')};
  const goBack=()=>{setSelectedMovie(null);setTab(prevTab)};

  const handleAuth=(u)=>{setUser(u);setShowAuth(false);};
  const handleLogout=()=>{
    lsSet('km_cur',null);
    localStorage.removeItem('km_cur');
    setUser(null);setTab('home');
  };

  const doSearch=()=>{
    if(!searchInput.trim())return;
    setSearchQ(searchInput.trim());
    setPrevTab(tab);
    setTab('search');
  };

  const navClick=(t)=>{
    if(t==='profile'){if(!user){setShowAuth(true);return;}setTab('profile');return;}
    setSelectedMovie(null);setTab(t);
  };

  return(
    <div>
      {/* HEADER */}
      <div className="header">
        <div className="logo"onClick={()=>navClick('home')}>КИНОМАНИЯ</div>
        <div className="header-right">
          <div className="search-wrap">
            <button className="search-icon"onClick={doSearch}>🔍</button>
            <input placeholder="Поиск..."value={searchInput}
              onChange={e=>setSearchInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&doSearch()}/>
            {searchInput&&<button className="search-clear"onClick={()=>{setSearchInput('');if(tab==='search')setTab(prevTab)}}>×</button>}
          </div>
          <div className="avatar-btn"onClick={()=>user?navClick('profile'):setShowAuth(true)}>
            {user?<span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14}}>{user.name[0].toUpperCase()}</span>:'👤'}
          </div>
        </div>
      </div>

      {/* NAV */}
      <div className="nav">
        {[['home','ГЛАВНАЯ'],['movies','ФИЛЬМЫ'],['series','СЕРИАЛЫ'],['info','ИНФО']].map(([t,l])=>(
          <div key={t}className={`nav-item${tab===t?' active':''}`}onClick={()=>navClick(t)}>{l}</div>
        ))}
      </div>

      {/* CONTENT */}
      {tab==='home'&&<HomePage onMovie={goMovie}/>}
      {tab==='movies'&&<ListPage type="movie"onMovie={goMovie}/>}
      {tab==='series'&&<ListPage type="series"onMovie={goMovie}/>}
      {tab==='info'&&<InfoPage/>}
      {tab==='profile'&&user&&<ProfilePage user={user}onLogout={handleLogout}favs={favs}onMovie={goMovie}/>}
      {tab==='search'&&<SearchResults query={searchQ}onMovie={goMovie}/>}
      {tab==='detail'&&selectedMovie&&(
        <MovieDetail movie={selectedMovie}user={user}onBack={goBack}
          favs={favs}toggleFav={toggleFav}onAuthNeeded={()=>setShowAuth(true)}/>
      )}

      {/* FOOTER */}
      <div className="footer">
        <div className="footer-social">
          НАШИ СОЦСЕТИ:
          <div className="social-icon"style={{background:'#000',border:'2px solid #333'}}>🎵</div>
          <div className="social-icon"style={{background:'#5865F2'}}>💬</div>
          <div className="social-icon"style={{background:'#0088cc'}}>✈️</div>
          <div className="social-icon"style={{background:'#FF0000'}}>▶</div>
        </div>
        <div className="footer-contact">КОНТАКТЫ</div>
        <div className="footer-copy">© 2026 КИНОМАНИЯ</div>
      </div>

      {/* AUTH MODAL */}
      {showAuth&&<AuthModal onClose={()=>setShowAuth(false)}onAuth={handleAuth}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
